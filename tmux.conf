# Prefix: tmux default C-b (C-a experiment reverted — clashed with zsh line editing)

# Enable mouse support (scrolling, clicking to select panes/windows)
set -g mouse on

# Use vi-style copy mode and copy selections to the macOS clipboard
setw -g mode-keys vi
set -sg set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Split panes using | and - (easier to remember, keep current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane selection with prefix (C-h/j/k/l also works without prefix
# via vim-tmux-navigator). Note: C-a l overrides tmux's default "last window".
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing: C-a H/J/K/L, repeatable while prefix is held (-r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload configuration easily with 'r'
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# True color support (needed for nvim themes to render correctly)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Let nvim image plugins draw through tmux via the kitty graphics protocol
# (requires a graphics-capable terminal like Ghostty; Apple Terminal cannot)
set -gq allow-passthrough on

# QoL
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 100000
set -g focus-events on

# Plugins (keep at bottom of file)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
run '~/.tmux/plugins/tpm/tpm'
